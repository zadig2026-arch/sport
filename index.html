<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sport">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>Sport — Prise de masse</title>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <h1>Sport</h1>
    <span id="current-phase" class="badge">Phase 1 · S1</span>
  </div>
  <button id="btn-settings" class="icon-btn" aria-label="Réglages">⚙</button>
</header>

<nav class="tabs" role="tablist">
  <button class="tab active" data-tab="seance" role="tab">Séance</button>
  <button class="tab" data-tab="suivi" role="tab">Suivi</button>
  <button class="tab" data-tab="nutrition" role="tab">Nutrition</button>
</nav>

<main>

  <!-- SÉANCE -->
  <section id="tab-seance" class="tab-panel active">
    <div class="session-picker">
      <label for="session-select">Séance du jour</label>
      <select id="session-select"></select>
    </div>
    <div id="session-intro" class="session-intro"></div>
    <div id="exercises" class="exercises"></div>
    <div class="done-zone">
      <button id="btn-finish-session" class="primary big">Terminer la séance</button>
    </div>
  </section>

  <!-- SUIVI -->
  <section id="tab-suivi" class="tab-panel">
    <div class="card">
      <h2>Pesée hebdomadaire</h2>
      <p class="muted">Lundi matin à jeun — objectif +0,3 à 0,5 kg/semaine</p>
      <div class="row">
        <input id="input-weight" type="number" step="0.1" inputmode="decimal" placeholder="Poids en kg">
        <button id="btn-save-weight" class="primary">Enregistrer</button>
      </div>
      <div id="weight-feedback" class="feedback"></div>
    </div>

    <div class="card">
      <h2>Évolution du poids</h2>
      <canvas id="weight-chart" width="600" height="300"></canvas>
      <div id="weight-list" class="weight-list"></div>
    </div>

    <div class="card">
      <h2>Charges récentes</h2>
      <div id="recent-loads" class="recent-loads"></div>
    </div>

    <div class="card danger-card">
      <h2>Zone dangereuse</h2>
      <button id="btn-reset" class="danger">Effacer toutes les données</button>
    </div>
  </section>

  <!-- NUTRITION -->
  <section id="tab-nutrition" class="tab-panel">
    <div class="card macro-card">
      <h2>Cibles du jour</h2>
      <div class="macros">
        <div><div class="macro-val" id="macro-kcal">–</div><div class="macro-lbl">kcal</div></div>
        <div><div class="macro-val" id="macro-p">–</div><div class="macro-lbl">protéines</div></div>
        <div><div class="macro-val" id="macro-g">–</div><div class="macro-lbl">glucides</div></div>
        <div><div class="macro-val" id="macro-l">–</div><div class="macro-lbl">lipides</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Journée type</h2>
      <div id="meals"></div>
    </div>

    <div class="card">
      <h2>Liste de courses (semaine)</h2>
      <ul id="grocery-list" class="grocery"></ul>
      <p class="muted" id="grocery-total"></p>
    </div>

    <div class="card">
      <h2>Principes</h2>
      <ul id="nutrition-principes" class="bullets"></ul>
    </div>
  </section>

</main>

<!-- Timer de repos -->
<div id="rest-timer" class="rest-timer hidden">
  <div class="rest-time" id="rest-display">02:00</div>
  <button id="rest-cancel" class="ghost">Annuler</button>
</div>

<!-- Settings modal -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-content">
    <h2>Réglages</h2>
    <label>
      Semaine actuelle
      <input type="number" id="input-week" min="1" max="12" value="1">
    </label>
    <label>
      Phase
      <select id="input-phase">
        <option value="phase1">Phase 1 (S1-2) Adaptation</option>
        <option value="phase2">Phase 2 (S3-12) Progression</option>
      </select>
    </label>
    <div class="row">
      <button id="settings-save" class="primary">Enregistrer</button>
      <button id="settings-close" class="ghost">Fermer</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
